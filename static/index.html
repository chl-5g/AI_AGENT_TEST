<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>极简 RAG 客服</title>
  <style>
    :root {
      --bg: #0f1419;
      --panel: #1a2332;
      --text: #e7ecf3;
      --muted: #8b9cb3;
      --accent: #3d8bfd;
      --accent-hover: #5a9dff;
      --border: #2d3a4d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }
    main {
      width: 100%;
      max-width: 40rem;
    }
    h1 {
      font-size: 1.35rem;
      font-weight: 600;
      margin: 0 0 0.25rem;
    }
    .sub {
      color: var(--muted);
      font-size: 0.875rem;
      margin-bottom: 1.5rem;
    }
    label {
      display: block;
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 0.35rem;
    }
    textarea {
      width: 100%;
      min-height: 6rem;
      padding: 0.75rem 1rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel);
      color: var(--text);
      font-size: 1rem;
      line-height: 1.5;
      resize: vertical;
    }
    textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(61, 139, 253, 0.25);
    }
    .row {
      display: flex;
      gap: 0.75rem;
      margin-top: 1rem;
      align-items: center;
    }
    button {
      padding: 0.6rem 1.25rem;
      border: none;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover:not(:disabled) { background: var(--accent-hover); }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .out {
      margin-top: 1.75rem;
      padding: 1rem 1.1rem;
      border-radius: 8px;
      background: var(--panel);
      border: 1px solid var(--border);
      min-height: 3rem;
      line-height: 1.6;
    }
    .out.md { white-space: normal; }
    .out.md :first-child { margin-top: 0; }
    .out.md :last-child { margin-bottom: 0; }
    .out.md h2, .out.md h3, .out.md h4 {
      font-size: 1.05rem;
      font-weight: 600;
      margin: 1em 0 0.5rem;
      color: var(--text);
    }
    .out.md h2 { font-size: 1.15rem; border-bottom: 1px solid var(--border); padding-bottom: 0.25rem; }
    .out.md p { margin: 0.55em 0; }
    .out.md ul, .out.md ol { margin: 0.55em 0; padding-left: 1.35rem; }
    .out.md li { margin: 0.25em 0; }
    .out.md strong { color: #fff; font-weight: 600; }
    .out.md code {
      font-family: ui-monospace, Consolas, monospace;
      font-size: 0.88em;
      background: rgba(0, 0, 0, 0.35);
      padding: 0.12em 0.4em;
      border-radius: 4px;
    }
    .out.md pre {
      margin: 0.75em 0;
      padding: 0.75rem 1rem;
      background: rgba(0, 0, 0, 0.4);
      border-radius: 8px;
      overflow-x: auto;
      border: 1px solid var(--border);
    }
    .out.md pre code {
      background: none;
      padding: 0;
      font-size: 0.85rem;
    }
    .out.md blockquote {
      margin: 0.6em 0;
      padding-left: 0.85rem;
      border-left: 3px solid var(--accent);
      color: var(--muted);
    }
    .out.md hr { border: none; border-top: 1px solid var(--border); margin: 1rem 0; }
    .out.md table { border-collapse: collapse; width: 100%; font-size: 0.9rem; margin: 0.75em 0; }
    .out.md th, .out.md td { border: 1px solid var(--border); padding: 0.4rem 0.6rem; text-align: left; }
    .out.md th { background: rgba(0, 0, 0, 0.25); }
    .out.empty { color: var(--muted); white-space: pre-wrap; }
    .sources {
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
      font-size: 0.8rem;
      color: var(--muted);
    }
    .sources h3 {
      font-size: 0.85rem;
      font-weight: 600;
      margin: 0 0 0.5rem;
      color: var(--text);
    }
    .sources ul { margin: 0; padding-left: 1.1rem; }
    .sources li { margin: 0.35em 0; line-height: 1.45; }
    .sources .src-path { color: var(--accent); word-break: break-all; }
    .err { color: #f87171; }
    footer {
      margin-top: 2rem;
      font-size: 0.8rem;
      color: var(--muted);
    }
    footer a { color: var(--accent); }
  </style>
</head>
<body>
  <main>
    <h1>极简 RAG 客服</h1>
    <p class="sub">在下方输入问题，回答会基于知识库中的资料检索生成。</p>

    <label for="q">你的问题</label>
    <textarea id="q" placeholder="例如：需求变更要走什么流程？" autofocus></textarea>

    <div class="row">
      <button type="button" id="send">发送</button>
      <span id="hint" class="sub" style="margin:0;"></span>
    </div>

    <div id="answer" class="out empty">回答会显示在这里。</div>
    <div id="sources" class="sources" style="display:none;max-width:40rem;width:100%;"></div>
  </main>
  <footer>
    <a href="/docs">API 文档</a>
    · 有索引时启动会跳过全量入库；更新知识库后可 POST /init
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js" crossorigin="anonymous"></script>
  <script>
    const q = document.getElementById("q");
    const send = document.getElementById("send");
    const answer = document.getElementById("answer");
    const sourcesEl = document.getElementById("sources");
    const hint = document.getElementById("hint");

    // 使用当前页面的 origin，避免相对路径在「非本服务打开的页面」里指错主机
    const apiChat = () => `${window.location.origin}/chat`;

    function escapeHtml(s) {
      const d = document.createElement("div");
      d.textContent = s;
      return d.innerHTML;
    }

    function renderMarkdown(text) {
      const t = text == null ? "" : String(text);
      if (typeof marked === "undefined" || typeof DOMPurify === "undefined") {
        const esc = document.createElement("div");
        esc.textContent = t;
        return esc.innerHTML.replace(/\n/g, "<br>");
      }
      const dirty = marked.parse(t, { breaks: true, gfm: true });
      return DOMPurify.sanitize(dirty, { USE_PROFILES: { html: true } });
    }

    function formatFetchError(err) {
      const msg = err && err.message ? err.message : String(err);
      if (/fail/i.test(msg) || /network/i.test(msg) || /load failed/i.test(msg)) {
        return (
          msg +
          "\n\n常见原因：\n" +
          "1）uvicorn 未在运行或已崩溃，请在看得到日志的终端里执行：uvicorn main:app --reload --host 127.0.0.1 --port 8000\n" +
          "2）不要用 Cursor/IDE 内置预览打开本页，请用 Chrome 或 Edge 地址栏输入：http://127.0.0.1:8000/\n" +
          "3）地址栏必须是 http://127.0.0.1:8000 打开的本页（不要本地 file:// 打开 static/index.html）\n" +
          "4）可新开标签访问 " +
          window.location.origin +
          "/health 应显示 {\"status\":\"ok\"}\n" +
          "5）关闭拦截 localhost 的广告/隐私类浏览器扩展后重试"
        );
      }
      return msg;
    }

    async function ask() {
      const text = q.value.trim();
      if (!text) {
        answer.className = "out err empty";
        answer.textContent = "请先输入问题。";
        return;
      }
      send.disabled = true;
      hint.textContent = "正在生成…";
      answer.className = "out md";
      answer.innerHTML = "";
      sourcesEl.style.display = "none";
      sourcesEl.innerHTML = "";

      try {
        const res = await fetch(apiChat(), {
          method: "POST",
          headers: { "Content-Type": "application/json", Accept: "application/json" },
          body: JSON.stringify({ query: text }),
          cache: "no-store",
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          let detail = res.statusText;
          if (data.detail != null) {
            detail = typeof data.detail === "string" ? data.detail : JSON.stringify(data.detail);
          }
          throw new Error(detail || "请求失败");
        }
        answer.className = "out md";
        const raw = data.answer || "(空回答)";
        answer.innerHTML = renderMarkdown(raw);
        const src = Array.isArray(data.sources) ? data.sources : [];
        if (src.length > 0) {
          let html = "<h3>引用溯源（检索命中）</h3><ul>";
          for (let i = 0; i < src.length; i++) {
            const s = src[i] || {};
            const path = s.source != null ? String(s.source) : "";
            const page = s.page != null && String(s.page) !== "-" ? "，第 " + s.page + " 页" : "";
            const ft = s.file_type ? " [" + s.file_type + "]" : "";
            const ex = s.excerpt != null ? String(s.excerpt) : "";
            html +=
              "<li><span class=\"src-path\">" +
              escapeHtml(path) +
              "</span>" +
              escapeHtml(ft) +
              escapeHtml(page) +
              (ex ? "<br/>「" + escapeHtml(ex) + "」" : "") +
              "</li>";
          }
          html += "</ul>";
          sourcesEl.innerHTML = html;
          sourcesEl.style.display = "block";
        }
      } catch (e) {
        answer.className = "out err empty";
        answer.textContent = "出错：" + formatFetchError(e);
      } finally {
        send.disabled = false;
        hint.textContent = "";
      }
    }

    send.addEventListener("click", ask);
    q.addEventListener("keydown", (ev) => {
      if (ev.key === "Enter" && (ev.ctrlKey || ev.metaKey)) ask();
    });
  </script>
</body>
</html>
