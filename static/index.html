<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>极简 RAG 客服</title>
  <style>
    :root {
      --bg: #eef2f9;
      --panel: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --border: #cbd5e1;
      --shadow: 0 1px 3px rgba(15, 23, 42, 0.06), 0 4px 14px rgba(15, 23, 42, 0.04);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", system-ui, "PingFang SC", sans-serif;
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
      /* 亮色背景：底层渐变 + 柔光斑（固定附着，滚动时仍有「整页底图」感） */
      background-color: #e8edf5;
      background-image:
        radial-gradient(ellipse 100% 80% at 50% -30%, rgba(147, 197, 253, 0.45), transparent 55%),
        radial-gradient(ellipse 70% 50% at 110% 20%, rgba(196, 181, 253, 0.22), transparent 50%),
        radial-gradient(ellipse 60% 45% at -10% 80%, rgba(125, 211, 252, 0.28), transparent 50%),
        radial-gradient(ellipse 50% 40% at 90% 95%, rgba(253, 224, 200, 0.35), transparent 45%),
        linear-gradient(168deg, #fbfcff 0%, #f1f5f9 42%, #e8f0fa 100%);
      background-attachment: fixed;
      background-size: 100% 100%;
    }
    main {
      width: 100%;
      max-width: 40rem;
    }
    main code {
      font-family: ui-monospace, Consolas, monospace;
      font-size: 0.9em;
      background: #f1f5f9;
      padding: 0.12em 0.4em;
      border-radius: 4px;
      border: 1px solid #e2e8f0;
      color: #475569;
    }
    h1 {
      font-size: 1.35rem;
      font-weight: 600;
      margin: 0 0 0.25rem;
    }
    .sub {
      color: var(--muted);
      font-size: 0.875rem;
      margin-bottom: 1.5rem;
    }
    label {
      display: block;
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 0.35rem;
    }
    textarea {
      width: 100%;
      min-height: 6rem;
      padding: 0.75rem 1rem;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.92);
      color: var(--text);
      font-size: 1rem;
      line-height: 1.5;
      resize: vertical;
      box-shadow: var(--shadow);
    }
    textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: var(--shadow), 0 0 0 3px rgba(37, 99, 235, 0.2);
    }
    .row {
      display: flex;
      gap: 0.75rem;
      margin-top: 1rem;
      align-items: center;
    }
    button {
      padding: 0.6rem 1.25rem;
      border: none;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover:not(:disabled) { background: var(--accent-hover); }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .out {
      margin-top: 1.75rem;
      padding: 1rem 1.1rem;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.88);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.9);
      box-shadow: var(--shadow);
      min-height: 3rem;
      line-height: 1.6;
    }
    .out.md { white-space: normal; }
    .out.md :first-child { margin-top: 0; }
    .out.md :last-child { margin-bottom: 0; }
    .out.md h2, .out.md h3, .out.md h4 {
      font-size: 1.05rem;
      font-weight: 600;
      margin: 1em 0 0.5rem;
      color: var(--text);
    }
    .out.md h2 { font-size: 1.15rem; border-bottom: 1px solid var(--border); padding-bottom: 0.25rem; }
    .out.md p { margin: 0.55em 0; }
    .out.md ul, .out.md ol { margin: 0.55em 0; padding-left: 1.35rem; }
    .out.md li { margin: 0.25em 0; }
    .out.md strong { color: #0c1222; font-weight: 600; }
    .out.md code {
      font-family: ui-monospace, Consolas, monospace;
      font-size: 0.88em;
      background: #f1f5f9;
      color: #334155;
      padding: 0.12em 0.4em;
      border-radius: 4px;
      border: 1px solid #e2e8f0;
    }
    .out.md pre {
      margin: 0.75em 0;
      padding: 0.75rem 1rem;
      background: #f8fafc;
      color: #1e293b;
      border-radius: 8px;
      overflow-x: auto;
      border: 1px solid var(--border);
    }
    .out.md pre code {
      background: none;
      padding: 0;
      font-size: 0.85rem;
    }
    .out.md blockquote {
      margin: 0.6em 0;
      padding-left: 0.85rem;
      border-left: 3px solid var(--accent);
      color: var(--muted);
    }
    .out.md hr { border: none; border-top: 1px solid var(--border); margin: 1rem 0; }
    .out.md table { border-collapse: collapse; width: 100%; font-size: 0.9rem; margin: 0.75em 0; }
    .out.md th, .out.md td { border: 1px solid var(--border); padding: 0.4rem 0.6rem; text-align: left; }
    .out.md th { background: #f1f5f9; color: #334155; }
    .out.empty { color: var(--muted); white-space: pre-wrap; }
    .sources-wrap {
      margin-top: 1rem;
      border-top: 1px solid var(--border);
      padding-top: 0.5rem;
      max-width: 40rem;
      width: 100%;
    }
    .sources-wrap summary.sources-summary {
      cursor: pointer;
      list-style: none;
      font-size: 0.85rem;
      color: var(--muted);
      user-select: none;
      display: flex;
      align-items: center;
      gap: 0.35rem;
      flex-wrap: wrap;
    }
    .sources-wrap summary.sources-summary:hover { color: var(--accent); }
    .sources-wrap summary.sources-summary::-webkit-details-marker { display: none; }
    .sources-wrap .sources-hint { font-weight: 400; opacity: 0.85; }
    .sources-body {
      margin-top: 0.75rem;
      font-size: 0.8rem;
      color: var(--muted);
    }
    .sources-body ul { margin: 0; padding-left: 1.1rem; }
    .sources-body li { margin: 0.35em 0; line-height: 1.45; }
    .sources-body .src-path { color: var(--accent); word-break: break-all; }
    .err { color: #dc2626; }
    footer {
      margin-top: 2rem;
      font-size: 0.8rem;
      color: var(--muted);
    }
    footer a { color: var(--accent); }
  </style>
</head>
<body>
  <main>
    <h1>极简 RAG 客服</h1>
    <p class="sub">在下方输入问题，回答会基于知识库中的资料检索生成。</p>

    <label for="q">你的问题</label>
    <textarea id="q" placeholder="Enter 发送 · Ctrl+Enter 换行&#10;例如：需求变更要走什么流程？" autofocus></textarea>

    <div class="row">
      <button type="button" id="send">发送</button>
      <span id="hint" class="sub" style="margin:0;"></span>
    </div>

    <div id="answer" class="out empty">回答会显示在这里。</div>
    <details id="sources-wrap" class="sources-wrap" style="display:none;">
      <summary class="sources-summary">
        <strong>引用溯源</strong>
        <span>（<span id="sources-count">0</span> 条命中）</span>
        <span class="sources-hint">点击展开</span>
      </summary>
      <div id="sources-body" class="sources-body"></div>
    </details>
  </main>
  <footer>
    <a href="/docs">API 文档</a>
    · 有索引时启动会跳过全量入库；更新知识库后可 POST /init
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js" crossorigin="anonymous"></script>
  <script>
    const q = document.getElementById("q");
    const send = document.getElementById("send");
    const answer = document.getElementById("answer");
    const sourcesWrap = document.getElementById("sources-wrap");
    const sourcesBody = document.getElementById("sources-body");
    const sourcesCountEl = document.getElementById("sources-count");
    const hint = document.getElementById("hint");

    // 使用当前页面的 origin，避免相对路径在「非本服务打开的页面」里指错主机
    const apiChat = () => `${window.location.origin}/chat`;

    function escapeHtml(s) {
      const d = document.createElement("div");
      d.textContent = s;
      return d.innerHTML;
    }

    function renderMarkdown(text) {
      const t = text == null ? "" : String(text);
      if (typeof marked === "undefined" || typeof DOMPurify === "undefined") {
        const esc = document.createElement("div");
        esc.textContent = t;
        return esc.innerHTML.replace(/\n/g, "<br>");
      }
      const dirty = marked.parse(t, { breaks: true, gfm: true });
      return DOMPurify.sanitize(dirty, { USE_PROFILES: { html: true } });
    }

    function formatFetchError(err) {
      const msg = err && err.message ? err.message : String(err);
      if (/fail/i.test(msg) || /network/i.test(msg) || /load failed/i.test(msg)) {
        return (
          msg +
          "\n\n常见原因：\n" +
          "1）uvicorn 未在运行或已崩溃，请在看得到日志的终端里执行：uvicorn main:app --reload --host 127.0.0.1 --port 8000\n" +
          "2）不要用 Cursor/IDE 内置预览打开本页，请用 Chrome 或 Edge 地址栏输入：http://127.0.0.1:8000/\n" +
          "3）地址栏必须是 http://127.0.0.1:8000 打开的本页（不要本地 file:// 打开 static/index.html）\n" +
          "4）可新开标签访问 " +
          window.location.origin +
          "/health 应显示 {\"status\":\"ok\"}\n" +
          "5）关闭拦截 localhost 的广告/隐私类浏览器扩展后重试"
        );
      }
      return msg;
    }

    async function ask() {
      const text = q.value.trim();
      if (!text) {
        answer.className = "out err empty";
        answer.textContent = "请先输入问题。";
        sourcesWrap.style.display = "none";
        sourcesBody.innerHTML = "";
        return;
      }
      send.disabled = true;
      hint.textContent = "正在生成…";
      answer.className = "out md";
      answer.innerHTML = "";
      sourcesWrap.style.display = "none";
      sourcesWrap.open = false;
      sourcesBody.innerHTML = "";

      try {
        const res = await fetch(apiChat(), {
          method: "POST",
          headers: { "Content-Type": "application/json", Accept: "application/json" },
          body: JSON.stringify({ query: text }),
          cache: "no-store",
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          let detail = res.statusText;
          if (data.detail != null) {
            detail = typeof data.detail === "string" ? data.detail : JSON.stringify(data.detail);
          }
          throw new Error(detail || "请求失败");
        }
        answer.className = "out md";
        const raw = data.answer || "(空回答)";
        answer.innerHTML = renderMarkdown(raw);
        const src = Array.isArray(data.sources) ? data.sources : [];
        if (src.length > 0) {
          let html = "<ul>";
          for (let i = 0; i < src.length; i++) {
            const s = src[i] || {};
            const path = s.source != null ? String(s.source) : "";
            const page = s.page != null && String(s.page) !== "-" ? "，第 " + s.page + " 页" : "";
            const ft = s.file_type ? " [" + s.file_type + "]" : "";
            const ex = s.excerpt != null ? String(s.excerpt) : "";
            html +=
              "<li><span class=\"src-path\">" +
              escapeHtml(path) +
              "</span>" +
              escapeHtml(ft) +
              escapeHtml(page) +
              (ex ? "<br/>「" + escapeHtml(ex) + "」" : "") +
              "</li>";
          }
          html += "</ul>";
          sourcesCountEl.textContent = String(src.length);
          sourcesBody.innerHTML = html;
          sourcesWrap.open = false;
          sourcesWrap.style.display = "block";
        }
      } catch (e) {
        answer.className = "out err empty";
        answer.textContent = "出错：" + formatFetchError(e);
        sourcesWrap.style.display = "none";
        sourcesBody.innerHTML = "";
      } finally {
        send.disabled = false;
        hint.textContent = "";
      }
    }

    send.addEventListener("click", ask);

    function insertNewlineAtCursor(el) {
      const start = el.selectionStart;
      const end = el.selectionEnd;
      el.value = el.value.slice(0, start) + "\n" + el.value.slice(end);
      el.selectionStart = el.selectionEnd = start + 1;
    }

    sourcesWrap.addEventListener("toggle", () => {
      const hint = sourcesWrap.querySelector(".sources-hint");
      if (hint) hint.textContent = sourcesWrap.open ? "点击收起" : "点击展开";
    });

    q.addEventListener("keydown", (ev) => {
      if (ev.key !== "Enter") return;
      // 拼音/日文等 IME 组字未结束时，Enter 用于上屏，勿当成发送
      if (ev.isComposing) return;
      // Ctrl+Enter / Cmd+Enter：换行（单独 Enter 在 textarea 里默认也是换行，故需手动插入）
      if (ev.ctrlKey || ev.metaKey) {
        ev.preventDefault();
        insertNewlineAtCursor(ev.target);
        return;
      }
      // 单独 Enter：发送，不插入换行
      ev.preventDefault();
      ask();
    });
  </script>
</body>
</html>
